<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 Web Security Checklist</title>
<!--
╔══════════════════════════════════════════════════════════════════════════════╗
║                    AI AGENT USAGE INSTRUCTIONS                             ║
╠══════════════════════════════════════════════════════════════════════════════╣
║                                                                            ║
║  HOW TO USE THIS FILE AS AN AI AGENT:                                      ║
║                                                                            ║
║  1. Read each checklist item in CHECKLIST_DATA below.                      ║
║  2. Audit the project's code, config, and infrastructure for that control. ║
║  3. Edit the AUDIT_RESULTS object with your findings:                      ║
║       "s{section}-{item}": "pass" | "fail" | "risk" | "na"                ║
║       Example: "s1-1": "pass"  means Section 1 Item 1 passed              ║
║  4. Edit the AUDIT_NOTES object to explain each finding:                   ║
║       "s1-2": "Password hashing uses MD5 in legacy/login.php line 42"     ║
║  5. Save the file — it auto-renders the results when opened in a browser.  ║
║  6. Click "Generate Report" for the full security assessment.              ║
║                                                                            ║
║  STATUS VALUES:                                                            ║
║    "pass"    — Control is in place and verified                            ║
║    "fail"    — Control is missing or broken — must fix                     ║
║    "risk"    — Risk accepted with documented justification                 ║
║    "na"      — Not applicable to this project                              ║
║    "pending" — Not yet reviewed (default)                                  ║
║                                                                            ║
╚══════════════════════════════════════════════════════════════════════════════╝
-->
<style>
:root {
  --bg:        #07071a;
  --s1:        #0d0d26;
  --s2:        #131338;
  --border:    #1c1c48;
  --border2:   #252560;
  --purple:    #7c3aed;
  --purple2:   #a78bfa;
  --gold:      #eab308;
  --gold2:     #fde047;
  --pass:      #059669;
  --pass2:     #34d399;
  --fail:      #dc2626;
  --fail2:     #f87171;
  --risk:      #d97706;
  --risk2:     #fbbf24;
  --na:        #374151;
  --na2:       #9ca3af;
  --text:      #f0f0ff;
  --muted:     #8888bb;
  --dim:       #555588;
  --r:         8px;
  --r2:        14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}

/* ── HEADER ──────────────────────────────────────────────── */
#app-header{position:sticky;top:0;z-index:100;background:rgba(7,7,26,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;white-space:nowrap}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--purple),var(--gold));border-radius:var(--r);display:grid;place-items:center;font-size:18px;flex-shrink:0}
.logo-text{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--purple2),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-fields{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap}
.header-input{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:7px 12px;color:var(--text);font-size:13px;min-width:160px;flex:1;max-width:280px;transition:.2s}
.header-input:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.2)}
.header-input::placeholder{color:var(--dim)}
#score-badge{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:13px;white-space:nowrap}
.score-num{font-size:1.3rem;font-weight:800;color:var(--gold)}
.score-label{color:var(--muted);font-size:11px}
#btn-report{background:linear-gradient(135deg,var(--purple),#5b21b6);color:#fff;border:none;border-radius:var(--r);padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s;display:flex;align-items:center;gap:6px}
#btn-report:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.4)}

/* ── PROGRESS BAR ────────────────────────────────────────── */
#global-progress{height:3px;background:var(--border);position:sticky;top:69px;z-index:99}
#global-progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--purple),var(--gold));transition:width .4s}

/* ── STATS BAR ───────────────────────────────────────────── */
#stats-bar{display:flex;gap:6px;padding:14px 24px;overflow-x:auto;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:6px;background:var(--s1);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;white-space:nowrap}
.stat-pill .dot{width:8px;height:8px;border-radius:50%}
.dot-pass{background:var(--pass2)}
.dot-fail{background:var(--fail2)}
.dot-risk{background:var(--risk2)}
.dot-na{background:var(--na2)}
.dot-pend{background:var(--dim)}
.stat-count{font-weight:700;font-size:14px;color:var(--text)}

/* ── MAIN LAYOUT ─────────────────────────────────────────── */
#main{max-width:1100px;margin:0 auto;padding:20px 24px 80px}
.section-grid{display:grid;gap:16px}

/* ── SECTION CARD ────────────────────────────────────────── */
.sec-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:.2s}
.sec-card:hover{border-color:var(--border2)}
.sec-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none;transition:.15s}
.sec-header:hover{background:rgba(255,255,255,.03)}
.sec-icon{font-size:20px;width:36px;text-align:center;flex-shrink:0}
.sec-title{font-weight:600;font-size:.95rem;flex:1}
.sec-meta{display:flex;align-items:center;gap:10px}
.sec-score{font-size:11px;color:var(--muted);white-space:nowrap}
.sec-pbar{width:80px;height:5px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}
.sec-pbar-fill{height:100%;border-radius:4px;transition:width .4s}
.sec-chevron{color:var(--muted);font-size:12px;transition:transform .25s;flex-shrink:0}
.sec-card.open .sec-chevron{transform:rotate(180deg)}

/* ── ITEMS LIST ──────────────────────────────────────────── */
.sec-body{display:none;border-top:1px solid var(--border)}
.sec-card.open .sec-body{display:block}
.item-row{display:flex;align-items:flex-start;gap:12px;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.04);transition:.15s}
.item-row:last-child{border-bottom:none}
.item-row:hover{background:rgba(255,255,255,.025)}
.item-num{font-size:11px;color:var(--dim);padding-top:2px;min-width:32px;font-weight:600}
.item-content{flex:1;min-width:0}
.item-text{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:8px}
.item-controls{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.status-btn{border:none;border-radius:6px;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.3px}
.status-btn:hover{transform:translateY(-1px)}
.btn-pass{background:rgba(5,150,105,.15);color:var(--pass2);border:1px solid rgba(52,211,153,.25)}
.btn-pass.active{background:var(--pass);color:#fff;border-color:var(--pass)}
.btn-fail{background:rgba(220,38,38,.15);color:var(--fail2);border:1px solid rgba(248,113,113,.25)}
.btn-fail.active{background:var(--fail);color:#fff;border-color:var(--fail)}
.btn-risk{background:rgba(217,119,6,.15);color:var(--risk2);border:1px solid rgba(251,191,36,.25)}
.btn-risk.active{background:var(--risk);color:#fff;border-color:var(--risk)}
.btn-na{background:rgba(55,65,81,.3);color:var(--na2);border:1px solid rgba(156,163,175,.2)}
.btn-na.active{background:var(--na);color:#fff;border-color:var(--na)}
.item-note{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--muted);font-size:12px;resize:none;height:32px;transition:.2s;font-family:inherit}
.item-note:focus{outline:none;border-color:var(--purple);color:var(--text);height:60px}
.item-note::placeholder{color:var(--dim)}

/* ── STATUS INDICATOR (left bar on row) ──────────────────── */
.item-row[data-status="pass"]{border-left:3px solid var(--pass)}
.item-row[data-status="fail"]{border-left:3px solid var(--fail);background:rgba(220,38,38,.04)}
.item-row[data-status="risk"]{border-left:3px solid var(--risk);background:rgba(217,119,6,.04)}
.item-row[data-status="na"]{border-left:3px solid var(--na);opacity:.6}

/* ── REPORT OVERLAY ──────────────────────────────────────── */
#report-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);overflow-y:auto;padding:24px 16px}
#report-overlay.open{display:flex;align-items:flex-start;justify-content:center}
#report-box{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r2);max-width:860px;width:100%;padding:0;overflow:hidden;box-shadow:0 25px 80px rgba(0,0,0,.6)}
.rpt-header{background:linear-gradient(135deg,#1a0a3e 0%,#0a0a2e 100%);padding:32px 36px;border-bottom:1px solid var(--border)}
.rpt-header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.rpt-title{font-size:1.5rem;font-weight:800;color:var(--text)}
.rpt-subtitle{color:var(--muted);font-size:13px;margin-top:4px}
#btn-close-report{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:var(--r);padding:8px 16px;color:var(--text);cursor:pointer;font-size:13px;transition:.2s;flex-shrink:0}
#btn-close-report:hover{background:rgba(255,255,255,.2)}
.rpt-score-row{display:flex;align-items:center;gap:24px;margin-top:24px;flex-wrap:wrap}
.rpt-score-circle{width:90px;height:90px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid;flex-shrink:0}
.rpt-score-big{font-size:1.8rem;font-weight:900;line-height:1}
.rpt-score-pct{font-size:11px;font-weight:600;opacity:.8}
.rpt-grade{font-size:3rem;font-weight:900;line-height:1}
.rpt-grade-label{font-size:13px;color:var(--muted)}
.rpt-summary-pills{display:flex;gap:8px;flex-wrap:wrap}
.rpt-pill{display:flex;flex-direction:column;align-items:center;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;min-width:70px}
.rpt-pill-num{font-size:1.4rem;font-weight:800}
.rpt-pill-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.rpt-body{padding:28px 36px;display:flex;flex-direction:column;gap:24px}
.rpt-section-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.rpt-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.rpt-issues{display:flex;flex-direction:column;gap:6px}
.rpt-issue{border-radius:var(--r);padding:10px 14px;font-size:13px;border:1px solid}
.rpt-issue.fail{background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.3);color:var(--fail2)}
.rpt-issue.risk{background:rgba(217,119,6,.08);border-color:rgba(217,119,6,.3);color:var(--risk2)}
.rpt-issue-id{font-weight:700;margin-right:8px;opacity:.8}
.rpt-issue-note{display:block;font-size:11px;opacity:.7;margin-top:2px}
.rpt-section-rows{display:flex;flex-direction:column;gap:6px}
.rpt-sec-row{display:flex;align-items:center;gap:12px;font-size:13px}
.rpt-sec-name{flex:1;color:var(--muted)}
.rpt-sec-counts{display:flex;gap:6px;font-size:11px;font-weight:700}
.rpt-sec-bar{width:140px;height:6px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}
.rpt-sec-bar-fill{height:100%;border-radius:4px}
.rpt-sec-pct{font-size:11px;color:var(--muted);min-width:32px;text-align:right}
.rpt-empty{color:var(--dim);font-size:13px;font-style:italic;padding:4px 0}
.rpt-footer{padding:20px 36px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;background:rgba(0,0,0,.15)}
.rpt-footer-meta{color:var(--dim);font-size:12px}
#btn-print{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:8px 18px;color:var(--text);cursor:pointer;font-size:13px;transition:.2s;display:flex;align-items:center;gap:6px}
#btn-print:hover{border-color:var(--gold);color:var(--gold)}

/* ── RESET BTN ───────────────────────────────────────────── */
#btn-reset{background:transparent;border:1px solid var(--border);border-radius:var(--r);padding:7px 14px;color:var(--muted);font-size:12px;cursor:pointer;transition:.2s}
#btn-reset:hover{border-color:var(--fail);color:var(--fail)}

/* ── PRINT STYLES ────────────────────────────────────────── */
@media print{
  body{background:#fff;color:#000}
  #app-header,#global-progress,#stats-bar,#main,#btn-close-report,#btn-print,#btn-reset{display:none!important}
  #report-overlay{display:block!important;position:static;background:none;padding:0}
  #report-box{border:none;box-shadow:none;max-width:100%}
  .rpt-header{background:#f0f0f0;color:#000}
  .rpt-issue.fail{background:#fee;border-color:#fcc}
  .rpt-issue.risk{background:#fff7e6;border-color:#ffd}
}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:600px){
  #app-header{padding:12px 16px}
  #main{padding:14px 14px 80px}
  .rpt-body,.rpt-header,.rpt-footer{padding-left:20px;padding-right:20px}
  .sec-header{padding:14px 16px}
  .item-row{padding:10px 16px}
}
</style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────── -->
<header id="app-header">
  <div class="logo">
    <div class="logo-icon">🔒</div>
    <span class="logo-text">Security Checklist</span>
  </div>
  <div class="header-fields">
    <input class="header-input" id="inp-project" placeholder="Project name…" />
    <input class="header-input" id="inp-auditor" placeholder="Auditor name…" style="max-width:200px"/>
  </div>
  <div id="score-badge">
    <div>
      <div class="score-num" id="hdr-score">—</div>
      <div class="score-label">SECURITY SCORE</div>
    </div>
  </div>
  <button id="btn-reset" onclick="resetAll()">↺ Reset</button>
  <button id="btn-report" onclick="openReport()">📋 Generate Report</button>
</header>

<div id="global-progress"><div id="global-progress-fill"></div></div>

<!-- ── STATS BAR ────────────────────────────────────────────────── -->
<div id="stats-bar">
  <div class="stat-pill"><div class="dot dot-pass"></div><span class="stat-count" id="cnt-pass">0</span>&nbsp;Passed</div>
  <div class="stat-pill"><div class="dot dot-fail"></div><span class="stat-count" id="cnt-fail">0</span>&nbsp;Failed</div>
  <div class="stat-pill"><div class="dot dot-risk"></div><span class="stat-count" id="cnt-risk">0</span>&nbsp;Risk Accepted</div>
  <div class="stat-pill"><div class="dot dot-na"></div><span class="stat-count" id="cnt-na">0</span>&nbsp;N/A</div>
  <div class="stat-pill"><div class="dot dot-pend"></div><span class="stat-count" id="cnt-pend">0</span>&nbsp;Pending</div>
  <div class="stat-pill" style="margin-left:auto"><span style="color:var(--muted)">Total</span>&nbsp;<span class="stat-count" id="cnt-total">0</span></div>
</div>

<!-- ── MAIN ─────────────────────────────────────────────────────── -->
<main id="main"><div class="section-grid" id="checklist-root"></div></main>

<!-- ── REPORT OVERLAY ────────────────────────────────────────────── -->
<div id="report-overlay">
  <div id="report-box">
    <div class="rpt-header">
      <div class="rpt-header-top">
        <div>
          <div class="rpt-title">🔒 Security Assessment Report</div>
          <div class="rpt-subtitle" id="rpt-meta"></div>
        </div>
        <button id="btn-close-report" onclick="closeReport()">✕ Close</button>
      </div>
      <div class="rpt-score-row">
        <div class="rpt-score-circle" id="rpt-circle">
          <div class="rpt-score-big" id="rpt-score-big">—</div>
          <div class="rpt-score-pct">/ 100</div>
        </div>
        <div>
          <div class="rpt-grade" id="rpt-grade">—</div>
          <div class="rpt-grade-label" id="rpt-grade-label">Not yet assessed</div>
        </div>
        <div class="rpt-summary-pills" id="rpt-pills"></div>
      </div>
    </div>
    <div class="rpt-body">
      <div>
        <div class="rpt-section-title">🔴 Critical Issues — Must Fix</div>
        <div class="rpt-issues" id="rpt-fails"></div>
      </div>
      <div>
        <div class="rpt-section-title">🟡 Accepted Risks — Review &amp; Document</div>
        <div class="rpt-issues" id="rpt-risks"></div>
      </div>
      <div>
        <div class="rpt-section-title">📊 Section Breakdown</div>
        <div class="rpt-section-rows" id="rpt-sections"></div>
      </div>
      <div>
        <div class="rpt-section-title">💡 Recommendations</div>
        <div id="rpt-recs" style="font-size:13px;color:var(--muted);line-height:1.8"></div>
      </div>
    </div>
    <div class="rpt-footer">
      <div class="rpt-footer-meta" id="rpt-footer-date"></div>
      <button id="btn-print" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
  </div>
</div>

<script>
/* ── CHECKLIST DATA ──────────────────────────────────────────────
   AI AGENTS: Review each item against the project's code and config.
   Edit AUDIT_RESULTS and AUDIT_NOTES below, then open in a browser.
──────────────────────────────────────────────────────────────── */
const CHECKLIST_DATA = [
  {
    id:1, icon:'🔐', title:'Authentication & Passwords', items:[
      'Passwords hashed with bcrypt or Argon2 — never MD5, SHA1, or plain text',
      'Password minimum length enforced server-side (12+ characters for sensitive apps)',
      'Password reset uses a cryptographically random token — not sequential IDs or guessable values',
      'Password reset tokens expire within 1 hour and are invalidated after first use',
      'Default / test passwords never used in production (no admin/admin, password123)',
      'Login error messages are generic — never reveal if the email OR the password was wrong',
      'Account lockout or delay after 5–10 failed login attempts per account',
      'Re-authentication required before sensitive actions (password change, transfer, account delete)',
      'MFA / 2FA available for privileged accounts (admin, finance roles)',
      'Passwords never logged, never stored in plain text anywhere',
      'API keys and secrets stored in environment variables — never hardcoded in source code',
      'Credentials must be secrets the user controls — not public data (ID numbers, DOB, phone)',
    ]
  },
  {
    id:2, icon:'🍪', title:'Session Management', items:[
      'Session ID regenerated immediately after every successful login',
      'Sessions expire after inactivity period (15–30 min for financial / sensitive apps)',
      'Absolute session timeout enforced regardless of activity (4–8 hours max)',
      'Session cookies: HttpOnly, Secure (HTTPS only), SameSite=Lax or Strict',
      'Sessions fully destroyed server-side on logout — not just cookie deletion',
      'No sensitive data stored in session beyond necessity (no passwords, card numbers)',
      'Session IDs never appear in URLs (visible in logs, browser history, referrer headers)',
    ]
  },
  {
    id:3, icon:'💉', title:'SQL Injection', items:[
      'All database queries use parameterized / prepared statements — no string concatenation with user input',
      'ORM or query builder used consistently — never bypassed with raw variable strings',
      'Native prepared statements enforced (PDO ATTR_EMULATE_PREPARES = false in PHP)',
      'Dynamic ORDER BY / LIMIT values whitelisted from a fixed allowed list — never passed raw',
      'Database user has minimum privileges — no DROP, no full admin access from the app',
      'Database errors never shown to users — logged server-side only',
      'Separate database credentials per environment (dev / staging / prod)',
    ]
  },
  {
    id:4, icon:'🧨', title:'Cross-Site Scripting (XSS)', items:[
      'All user-supplied data HTML-escaped before rendering (htmlspecialchars, template auto-escaping)',
      'JS output uses JSON.stringify / proper encoding — no raw echo $var inside <script> blocks',
      'Content-Security-Policy (CSP) header is set on all responses',
      "CSP avoids 'unsafe-inline' in script-src — uses nonces or hashes for any inline scripts",
      'X-Content-Type-Options: nosniff header set — prevents MIME-type sniffing attacks',
      'Rich text / HTML from users sanitised with an allowlist library (DOMPurify, HTMLPurifier)',
      'Uploaded files cannot be served as HTML, SVG with scripts, or JavaScript from web root',
    ]
  },
  {
    id:5, icon:'🛡️', title:'Cross-Site Request Forgery (CSRF)', items:[
      'Every state-changing form (POST/DELETE/PUT) includes a unique CSRF token',
      'Every AJAX endpoint that mutates data validates the CSRF token server-side',
      'CSRF token is tied to the session and validated server-side — not just present in the form',
      'Session cookies set with SameSite=Lax or Strict (partial CSRF mitigation)',
      'JSON APIs verify Origin or Referer header when relying on Content-Type: application/json',
    ]
  },
  {
    id:6, icon:'📎', title:'File Uploads', items:[
      'Allowed file types whitelisted (not blocklisted) — e.g. only PDF, JPG, PNG, DOCX',
      'MIME type validated server-side using content inspection (finfo, python-magic) — not just extension',
      'Uploaded files stored outside web root or in directory blocked by .htaccess / nginx config',
      'Uploaded filenames sanitised or replaced with a UUID — original name never used directly on disk',
      'Maximum file size enforced server-side (not just MAX_FILE_SIZE in HTML)',
      'Uploaded files never executed by the server (no PHP, .htaccess, or shell files uploadable)',
      'Images re-processed (resized / re-encoded) to strip any embedded payloads',
      'Malware scanning in place for uploads on high-risk apps (HR, finance, healthcare)',
    ]
  },
  {

  "s18-2": "All 7 security headers are missing. securityheaders.com would rate this F. The fastest fix is npm install helmet and app.use(helmet()) in server.js — covers all 7 in one line.",
  "s18-7": "No custom error pages. Add at minimum a 404.html and wire it up in server.js with a catch-all route.",
};

/* ── STATE ─────────────────────────────────────────────────────── */
const STORAGE_KEY = 'sec_checklist_v2';
let state = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  // Seed from AUDIT_RESULTS / AUDIT_NOTES
  const s = { project:'VALT Academy Website', auditor:'Claude Code — April 2026', results:{}, notes:{} };
  Object.assign(s.results, AUDIT_RESULTS);
  Object.assign(s.notes, AUDIT_NOTES);
  return s;
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}
function resetAll(){
  if(!confirm('Reset all checklist items to pending? This cannot be undone.')) return;
  state = { project:'', auditor:'', results:{}, notes:{} };
  saveState();
  document.getElementById('inp-project').value = '';
  document.getElementById('inp-auditor').value = '';
  renderAll();
}

/* ── RENDER ─────────────────────────────────────────────────────── */
function itemKey(secId, idx){ return `s${secId}-${idx+1}`; }

function renderAll(){
  const root = document.getElementById('checklist-root');
  root.innerHTML = '';
  CHECKLIST_DATA.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'sec-card open';
    card.id = `sec-${sec.id}`;

    // calculate section stats
    const secStats = getSectionStats(sec);

    card.innerHTML = `
      <div class="sec-header" onclick="toggleSection(${sec.id})">
        <div class="sec-icon">${sec.icon}</div>
        <div class="sec-title">${sec.id}. ${sec.title}</div>
        <div class="sec-meta">
          <span class="sec-score" id="sec-score-${sec.id}">${secStats.done}/${sec.items.length}</span>
          <div class="sec-pbar"><div class="sec-pbar-fill" id="sec-pbar-${sec.id}" style="width:${secStats.pct}%;background:${secStats.color}"></div></div>
          <span class="sec-chevron">▼</span>
        </div>
      </div>
      <div class="sec-body" id="sec-body-${sec.id}">
        ${sec.items.map((text,i) => renderItem(sec.id, i, text)).join('')}
      </div>`;
    root.appendChild(card);
  });
  updateGlobalStats();
}

function renderItem(secId, idx, text){
  const key = itemKey(secId, idx);
  const status = state.results[key] || 'pending';
  const note = (state.notes[key] || '').replace(/"/g,'&quot;');
  const statuses = ['pass','fail','risk','na'];
  const labels = { pass:'✓ Pass', fail:'✗ Fail', risk:'⚠ Risk', na:'— N/A' };
  const btns = statuses.map(s =>
    `<button class="status-btn btn-${s}${status===s?' active':''}"
      onclick="setStatus('${key}','${s}',this)">${labels[s]}</button>`
  ).join('');
  return `
    <div class="item-row" id="row-${key}" data-status="${status}">
      <div class="item-num">${secId}.${idx+1}</div>
      <div class="item-content">
        <div class="item-text">${text}</div>
        <div class="item-controls">
          ${btns}
          <textarea class="item-note" placeholder="Add a note or finding…"
            oninput="setNote('${key}',this.value)">${note}</textarea>
        </div>
      </div>
    </div>`;
}

function toggleSection(id){
  const card = document.getElementById(`sec-${id}`);
  card.classList.toggle('open');
}

/* ── STATUS ACTIONS ─────────────────────────────────────────────── */
function setStatus(key, status, btn){
  const prev = state.results[key];
  // Toggle off if clicking the same status again
  if(prev === status){
    delete state.results[key];
    status = 'pending';
  } else {
    state.results[key] = status;
  }
  saveState();

  // Update row
  const row = document.getElementById(`row-${key}`);
  row.dataset.status = status;
  row.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  if(status !== 'pending') btn.classList.add('active');

  // Update section bar + global stats
  const secId = parseInt(key.split('-')[0].replace('s',''));
  updateSectionBar(secId);
  updateGlobalStats();
}

function setNote(key, value){
  if(value.trim()) state.notes[key] = value;
  else delete state.notes[key];
  saveState();
}

/* ── STATS CALCULATION ──────────────────────────────────────────── */
function getSectionStats(sec){
  let pass=0,fail=0,risk=0,na=0,done=0;
  sec.items.forEach((_,i)=>{
    const s = state.results[itemKey(sec.id,i)] || 'pending';
    if(s==='pass') pass++;
    if(s==='fail') fail++;
    if(s==='risk') risk++;
    if(s==='na')   na++;
    if(s!=='pending') done++;
  });
  const pct = sec.items.length ? Math.round(done/sec.items.length*100) : 0;
  const color = fail>0 ? 'var(--fail)' : risk>0 ? 'var(--risk)' : pass>0||na>0 ? 'var(--pass)' : 'var(--dim)';
  return {pass,fail,risk,na,done,pct,color};
}

function getGlobalStats(){
  let pass=0,fail=0,risk=0,na=0,pend=0;
  CHECKLIST_DATA.forEach(sec=>{
    sec.items.forEach((_,i)=>{
      const s = state.results[itemKey(sec.id,i)] || 'pending';
      if(s==='pass') pass++;
      else if(s==='fail') fail++;
      else if(s==='risk') risk++;
      else if(s==='na')   na++;
      else pend++;
    });
  });
  const reviewed = pass+fail+risk+na;
  const total = reviewed+pend;
  // Score: pass gets 1 point, na gets 1 point (not applicable), risk gets 0.5, fail gets 0
  const scoreBase = pass+na;
  const scorePossible = pass+fail+risk+na;
  const score = scorePossible ? Math.round((scoreBase + risk*0.5)/scorePossible*100) : null;
  return {pass,fail,risk,na,pend,total,reviewed,score};
}

function updateSectionBar(secId){
  const sec = CHECKLIST_DATA.find(s=>s.id===secId);
  if(!sec) return;
  const st = getSectionStats(sec);
  const fill = document.getElementById(`sec-pbar-${secId}`);
  const score = document.getElementById(`sec-score-${secId}`);
  if(fill){ fill.style.width=st.pct+'%'; fill.style.background=st.color; }
  if(score) score.textContent = `${st.done}/${sec.items.length}`;
}

function updateGlobalStats(){
  const g = getGlobalStats();
  document.getElementById('cnt-pass').textContent = g.pass;
  document.getElementById('cnt-fail').textContent = g.fail;
  document.getElementById('cnt-risk').textContent = g.risk;
  document.getElementById('cnt-na').textContent   = g.na;
  document.getElementById('cnt-pend').textContent = g.pend;
  document.getElementById('cnt-total').textContent = g.total;

  const pct = Math.round((g.pass+g.na+g.risk) / Math.max(g.total,1) * 100);
  document.getElementById('global-progress-fill').style.width = pct+'%';

  if(g.score !== null){
    document.getElementById('hdr-score').textContent = g.score;
  } else {
    document.getElementById('hdr-score').textContent = '—';
  }
}

/* ── REPORT ──────────────────────────────────────────────────────── */
function gradeInfo(score){
  if(score>=95) return {grade:'A+',label:'Excellent — enterprise ready',color:'#22c55e'};
  if(score>=85) return {grade:'A', label:'Strong security posture',color:'#4ade80'};
  if(score>=75) return {grade:'B+',label:'Good — minor gaps to address',color:'#a3e635'};
  if(score>=65) return {grade:'B', label:'Adequate — improvements needed',color:'#eab308'};
  if(score>=50) return {grade:'C', label:'Weak — significant risks present',color:'#f97316'};
  return              {grade:'F', label:'Critical — do not deploy',color:'#ef4444'};
}

function openReport(){
  const g = getGlobalStats();
  const project = document.getElementById('inp-project').value.trim() || 'Unnamed Project';
  const auditor = document.getElementById('inp-auditor').value.trim() || 'Unknown';
  const now = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});

  document.getElementById('rpt-meta').textContent =
    `${project} · Auditor: ${auditor} · ${now}`;
  document.getElementById('rpt-footer-date').textContent =
    `Generated ${new Date().toLocaleString()} · ${g.reviewed}/${g.total} items reviewed`;

  // Score circle
  const score = g.score !== null ? g.score : 0;
  const gi = gradeInfo(score);
  const circle = document.getElementById('rpt-circle');
  circle.style.borderColor = gi.color;
  circle.style.color = gi.color;
  document.getElementById('rpt-score-big').textContent = g.score !== null ? score : '—';
  document.getElementById('rpt-grade').textContent = g.score !== null ? gi.grade : '—';
  document.getElementById('rpt-grade').style.color = gi.color;
  document.getElementById('rpt-grade-label').textContent = g.score !== null ? gi.label : 'No items reviewed yet';

  // Summary pills
  const pillData = [
    {num:g.pass, label:'Passed',   col:'var(--pass2)'},
    {num:g.fail, label:'Failed',   col:'var(--fail2)'},
    {num:g.risk, label:'Risk',     col:'var(--risk2)'},
    {num:g.na,   label:'N/A',      col:'var(--na2)'},
    {num:g.pend, label:'Pending',  col:'var(--dim)'},
  ];
  document.getElementById('rpt-pills').innerHTML = pillData.map(p=>
    `<div class="rpt-pill">
      <div class="rpt-pill-num" style="color:${p.col}">${p.num}</div>
      <div class="rpt-pill-label">${p.label}</div>
    </div>`).join('');

  // Failed items
  const failsEl = document.getElementById('rpt-fails');
  const fails = [];
  CHECKLIST_DATA.forEach(sec=>{
    sec.items.forEach((text,i)=>{
      const key = itemKey(sec.id,i);
      if((state.results[key]||'pending')==='fail'){
        fails.push({key, sec, idx:i, text, note:state.notes[key]||''});
      }
    });
  });
  failsEl.innerHTML = fails.length
    ? fails.map(f=>`
        <div class="rpt-issue fail">
          <span class="rpt-issue-id">[${f.sec.id}.${f.idx+1}]</span>${f.text}
          ${f.note?`<span class="rpt-issue-note">📝 ${f.note}</span>`:''}
        </div>`).join('')
    : '<div class="rpt-empty">✅ No failed items — great work!</div>';

  // Risk items
  const risksEl = document.getElementById('rpt-risks');
  const risks = [];
  CHECKLIST_DATA.forEach(sec=>{
    sec.items.forEach((text,i)=>{
      const key = itemKey(sec.id,i);
      if((state.results[key]||'pending')==='risk'){
        risks.push({key, sec, idx:i, text, note:state.notes[key]||''});
      }
    });
  });
  risksEl.innerHTML = risks.length
    ? risks.map(r=>`
        <div class="rpt-issue risk">
          <span class="rpt-issue-id">[${r.sec.id}.${r.idx+1}]</span>${r.text}
          ${r.note?`<span class="rpt-issue-note">📝 ${r.note}</span>`:''}
        </div>`).join('')
    : '<div class="rpt-empty">No accepted risks recorded.</div>';

  // Section breakdown
  const secsEl = document.getElementById('rpt-sections');
  secsEl.innerHTML = CHECKLIST_DATA.map(sec=>{
    const st = getSectionStats(sec);
    const color = st.fail>0?'var(--fail)':st.risk>0?'var(--risk)':st.pass>0||st.na>0?'var(--pass)':'var(--dim)';
    const pct = sec.items.length ? Math.round((st.pass+st.na)/sec.items.length*100) : 0;
    return `
      <div class="rpt-sec-row">
        <span style="width:22px;text-align:center;flex-shrink:0">${sec.icon}</span>
        <span class="rpt-sec-name">${sec.title}</span>
        <span class="rpt-sec-counts">
          ${st.pass>0?`<span style="color:var(--pass2)">✓${st.pass}</span>`:''}
          ${st.fail>0?`<span style="color:var(--fail2)">✗${st.fail}</span>`:''}
          ${st.risk>0?`<span style="color:var(--risk2)">⚠${st.risk}</span>`:''}
          ${st.na>0?`<span style="color:var(--na2)">—${st.na}</span>`:''}
        </span>
        <div class="rpt-sec-bar"><div class="rpt-sec-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="rpt-sec-pct">${st.done?pct+'%':'—'}</span>
      </div>`;
  }).join('');

  // Recommendations
  const recLines = [];
  if(fails.length>0){
    recLines.push(`<strong style="color:var(--fail2)">🔴 Priority 1 — Critical:</strong> Fix the ${fails.length} failed item${fails.length>1?'s':''} immediately. Do not deploy to production until these are resolved.`);
  }
  if(risks.length>0){
    recLines.push(`<strong style="color:var(--risk2)">🟡 Priority 2 — Review Risks:</strong> ${risks.length} accepted risk${risks.length>1?'s':''} are documented. Ensure each has a written justification and a plan to address over time.`);
  }
  if(g.pend>0){
    recLines.push(`<strong style="color:var(--muted)">🔵 Priority 3 — Complete Audit:</strong> ${g.pend} item${g.pend>1?'s':''} still pending review. Complete the checklist for a full picture.`);
  }
  recLines.push(`<strong style="color:var(--na2)">📦 Ongoing:</strong> Run <code>npm audit</code> / <code>composer audit</code> regularly. Rerun this checklist after every major feature or before every deployment.`);
  if(g.score >= 85 && fails.length===0){
    recLines.push(`<strong style="color:var(--pass2)">🎉 Looking good!</strong> Your security posture is strong. Schedule a formal penetration test for production at least once a year.`);
  }
  document.getElementById('rpt-recs').innerHTML = recLines.map(l=>`<div style="margin-bottom:8px">• ${l}</div>`).join('');

  // Open overlay
  document.getElementById('report-overlay').classList.add('open');
}

function closeReport(){
  document.getElementById('report-overlay').classList.remove('open');
}

// Close overlay on background click
document.getElementById('report-overlay').addEventListener('click', function(e){
  if(e.target === this) closeReport();
});

/* ── INIT ───────────────────────────────────────────────────────── */
document.getElementById('inp-project').value = state.project || '';
document.getElementById('inp-auditor').value = state.auditor || '';
document.getElementById('inp-project').addEventListener('input', e=>{
  state.project = e.target.value; saveState();
});
document.getElementById('inp-auditor').addEventListener('input', e=>{
  state.auditor = e.target.value; saveState();
});

renderAll();
</script>
</body>
</html>
